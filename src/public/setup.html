<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>🦞 OpenClaw — Personal AI Assistant</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style type="text/tailwindcss">
    @theme {
      --font-sans: 'Space Grotesk', ui-sans-serif, system-ui, -apple-system, sans-serif;
    }
    [x-cloak] { display: none !important; }
  </style>
  <script>
  document.addEventListener('alpine:init', () => {
    Alpine.data('setupApp', () => ({
      step: 1,
      totalSteps: 3,
      status: 'Loading...',
      configured: false,
      openclawVersion: '',
      authGroups: [],
      selectedGroup: '',
      authChoices: [],
      selectedAuth: '',
      authSecret: '',
      telegramToken: '',
      discordToken: '',
      slackBotToken: '',
      slackAppToken: '',
      model: '',
      log: '',
      loading: false,
      pairingChannel: '',
      pairingCode: '',
      showPairingModal: false,
      isReady: false,
      tuiEnabled: false,
      exporting: false,
      showExportInfo: false,
      showDevicesModal: false,
      devicesLoading: false,
      devices: [],
      devicesPending: [],
      devicesPaired: [],
      // Custom provider fields
      customProviderName: '',
      customBaseUrl: '',
      customApiType: 'openai-completions',
      customModelId: '',
      // i18n
      lang: (navigator.language || '').startsWith('zh') ? 'zh' : 'en',
      translations: {
        en: {
          title: 'Personal AI Assistant',
          subtitle: 'Configure your AI assistant in a few simple steps',
          statusConfigured: 'Configured - open /openclaw',
          statusNotConfigured: 'Not configured - run setup below',
          openUI: 'Open OpenClaw UI',
          openTerminal: 'Open Terminal',
          setupComplete: 'Setup Complete',
          setupCompleteDesc: 'Your OpenClaw instance is configured and running',
          devices: 'Devices',
          devicesDesc: 'Manage devices and channel access',
          approveChannelAccess: 'Approve Channel Access',
          approveChannelAccessDesc: 'Grant DM access to users who have requested access on Telegram or Discord.',
          manageDevices: 'Manage Devices',
          manageDevicesDesc: 'Approve or reject browser/device pairing requests for the Control UI.',
          maintenance: 'Maintenance',
          maintenanceDesc: 'Health checks and data export',
          runDoctor: 'Run Doctor',
          runDoctorDesc: 'Performs health checks and repairs broken configuration.',
          running: 'Running...',
          exportData: 'Export Data',
          exportDataDesc: 'Download a password-protected ZIP of your config and workspace data.',
          exporting: 'Exporting...',
          dangerZone: 'Danger Zone',
          dangerZoneDesc: 'Destructive actions that cannot be undone',
          resetSetup: 'Reset Setup',
          resetSetupDesc: 'Deletes the config file so you can run onboarding again from scratch.',
          step1Title: 'Model & Authentication',
          step1Desc: 'Choose your AI provider and authentication method',
          providerGroup: 'Provider Group',
          authMethod: 'Auth Method',
          apiKeyToken: 'API Key / Token',
          apiKeyPlaceholder: 'Paste your API key or token',
          modelLabel: 'Model',
          modelPlaceholder: 'e.g. openai/gpt-4.1, anthropic/claude-sonnet-4',
          modelHint: 'Format: provider/model-name',
          step2Title: 'Channels',
          step2Desc: 'Connect messaging platforms (optional — can be added later)',
          telegramPlaceholder: 'Bot token from @BotFather',
          telegramHint: 'Message @BotFather on Telegram and run /newbot',
          discordPlaceholder: 'Bot token from Developer Portal',
          discordHint: 'Enable MESSAGE CONTENT INTENT in Bot → Privileged Gateway Intents',
          slackBotPlaceholder: 'Bot token (xoxb-...)',
          slackAppPlaceholder: 'App token (xapp-...)',
          step3Title: 'Run Setup',
          step3Desc: 'Review your configuration and start OpenClaw',
          configSummary: 'Configuration Summary',
          provider: 'Provider',
          auth: 'Auth',
          channels: 'Channels',
          none: 'None',
          runSetupBtn: 'Run Setup',
          reset: 'Reset',
          resetNote: 'Reset deletes the config file so you can rerun onboarding. Channel access approval grants DM access when dmPolicy=pairing.',
          back: 'Back',
          next: 'Next',
          approveLatest: 'Approve Latest Request',
          pendingRequests: 'Pending Requests',
          noPending: 'No pending requests',
          pairedDevices: 'Paired Devices',
          noPaired: 'No paired devices',
          approve: 'Approve',
          reject: 'Reject',
          cancel: 'Cancel',
          close: 'Close',
          unzipTitle: 'Unzip Instructions',
          unzipDesc: 'The exported ZIP is password-protected with your SETUP_PASSWORD.',
          macLinux: 'macOS / Linux',
          windowsPs: 'Windows (PowerShell)',
          windowsPsDesc: 'Use 7-Zip to extract — right-click the file, select "Extract Here", and enter your password when prompted.',
          using7z: 'Using 7z CLI',
          channel: 'Channel',
          selectChannel: 'Select channel...',
          pairingCode: 'Pairing Code',
          devicesModalDesc: 'When a new browser connects to the Control UI, it requires a one-time pairing approval.',
          loading: 'Loading...',
          default: 'Default',
          // Custom provider fields
          customProviderNameLabel: 'Provider Name',
          customProviderNamePlaceholder: 'e.g. my-provider',
          customBaseUrlLabel: 'Base URL',
          customBaseUrlPlaceholder: 'e.g. https://api.example.com/v1',
          customApiTypeLabel: 'API Type',
          customModelIdLabel: 'Model ID',
          customModelIdPlaceholder: 'e.g. gpt-4, claude-sonnet-4',
          customProviderConfig: 'Custom Provider Config',
        },
        zh: {
          title: '个人 AI 助手',
          subtitle: '通过几个简单步骤配置你的 AI 助手',
          statusConfigured: '已配置 - 打开 /openclaw',
          statusNotConfigured: '未配置 - 请运行下方设置',
          openUI: '打开 OpenClaw UI',
          openTerminal: '打开终端',
          setupComplete: '设置完成',
          setupCompleteDesc: '你的 OpenClaw 实例已配置并运行',
          devices: '设备',
          devicesDesc: '管理设备和频道访问',
          approveChannelAccess: '批准频道访问',
          approveChannelAccessDesc: '授予在 Telegram 或 Discord 上请求访问的用户 DM 权限。',
          manageDevices: '管理设备',
          manageDevicesDesc: '批准或拒绝 Control UI 的浏览器/设备配对请求。',
          maintenance: '维护',
          maintenanceDesc: '健康检查和数据导出',
          runDoctor: '运行诊断',
          runDoctorDesc: '执行健康检查并修复损坏的配置。',
          running: '运行中...',
          exportData: '导出数据',
          exportDataDesc: '下载包含配置和工作区数据的加密 ZIP 文件。',
          exporting: '导出中...',
          dangerZone: '危险区域',
          dangerZoneDesc: '不可撤销的破坏性操作',
          resetSetup: '重置设置',
          resetSetupDesc: '删除配置文件，以便重新运行初始化。',
          step1Title: '模型与认证',
          step1Desc: '选择你的 AI 提供商和认证方式',
          providerGroup: '提供商',
          authMethod: '认证方式',
          apiKeyToken: 'API Key / Token',
          apiKeyPlaceholder: '粘贴你的 API Key 或 Token',
          modelLabel: '模型',
          modelPlaceholder: '例如 openai/gpt-4.1, anthropic/claude-sonnet-4',
          modelHint: '格式: provider/model-name',
          step2Title: '频道',
          step2Desc: '连接消息平台（可选 — 稍后也可添加）',
          telegramPlaceholder: '来自 @BotFather 的 Bot Token',
          telegramHint: '在 Telegram 上给 @BotFather 发消息并运行 /newbot',
          discordPlaceholder: '来自开发者门户的 Bot Token',
          discordHint: '在 Bot → Privileged Gateway Intents 中启用 MESSAGE CONTENT INTENT',
          slackBotPlaceholder: 'Bot Token (xoxb-...)',
          slackAppPlaceholder: 'App Token (xapp-...)',
          step3Title: '运行设置',
          step3Desc: '检查配置并启动 OpenClaw',
          configSummary: '配置摘要',
          provider: '提供商',
          auth: '认证',
          channels: '频道',
          none: '无',
          runSetupBtn: '运行设置',
          reset: '重置',
          resetNote: '重置会删除配置文件以便重新运行初始化。频道访问批准在 dmPolicy=pairing 时授予 DM 权限。',
          back: '返回',
          next: '下一步',
          approveLatest: '批准最新请求',
          pendingRequests: '待处理请求',
          noPending: '没有待处理的请求',
          pairedDevices: '已配对设备',
          noPaired: '没有已配对的设备',
          approve: '批准',
          reject: '拒绝',
          cancel: '取消',
          close: '关闭',
          unzipTitle: '解压说明',
          unzipDesc: '导出的 ZIP 文件使用你的 SETUP_PASSWORD 加密。',
          macLinux: 'macOS / Linux',
          windowsPs: 'Windows (PowerShell)',
          windowsPsDesc: '使用 7-Zip 解压 — 右键点击文件，选择"解压到此处"，然后输入密码。',
          using7z: '使用 7z 命令行',
          channel: '频道',
          selectChannel: '选择频道...',
          pairingCode: '配对码',
          devicesModalDesc: '当新浏览器连接到 Control UI 时，需要一次性配对批准。',
          loading: '加载中...',
          default: '默认',
          customProviderNameLabel: '提供商名称',
          customProviderNamePlaceholder: '例如 my-provider',
          customBaseUrlLabel: 'Base URL',
          customBaseUrlPlaceholder: '例如 https://api.example.com/v1',
          customApiTypeLabel: 'API 类型',
          customModelIdLabel: '模型 ID',
          customModelIdPlaceholder: '例如 gpt-4, claude-sonnet-4',
          customProviderConfig: '自定义提供商配置',
        },
      },

      t(key) {
        return (this.translations[this.lang] || this.translations.en)[key] || key;
      },

      toggleLang() {
        this.lang = this.lang === 'en' ? 'zh' : 'en';
      },

      get isCustomGroup() {
        const group = this.currentGroup;
        return group && group.custom === true;
      },

      get currentGroup() {
        return this.authGroups.find(g => g.value === this.selectedGroup);
      },

      async init() {
        await this.refreshStatus();
      },

      async httpJson(url, opts = {}) {
        opts.credentials = 'same-origin';
        const res = await fetch(url, opts);
        if (!res.ok) {
          const t = await res.text();
          throw new Error('HTTP ' + res.status + ': ' + (t || res.statusText));
        }
        return res.json();
      },

      async refreshStatus() {
        this.status = this.t('loading');
        try {
          const j = await this.httpJson('/setup/api/status');
          this.configured = j.configured;
          this.openclawVersion = j.openclawVersion || '';
          this.tuiEnabled = j.tuiEnabled || false;
          this.status = j.configured ? this.t('statusConfigured') : this.t('statusNotConfigured');
          this.authGroups = j.authGroups || [];
          if (this.authGroups.length > 0) {
            this.selectedGroup = this.authGroups[0].value;
            this.updateAuthChoices();
          }
          if (j.channelsAddHelp && j.channelsAddHelp.indexOf('telegram') === -1) {
            this.log += '\nNote: this openclaw build does not list telegram in `channels add --help`. Telegram auto-add will be skipped.\n';
          }
          this.isReady = true;
        } catch (e) {
          this.status = 'Error: ' + String(e);
          this.isReady = true;
        }
      },

      updateAuthChoices() {
        const group = this.currentGroup;
        this.authChoices = (group && group.options) ? group.options : [];
        if (this.authChoices.length > 0) {
          this.selectedAuth = this.authChoices[0].value;
        }
        // Auto-fill defaults for custom providers
        if (group && group.defaults) {
          this.customProviderName = group.defaults.customProviderName || '';
          this.customBaseUrl = group.defaults.customBaseUrl || '';
          this.customApiType = group.defaults.customApiType || 'openai-completions';
          this.customModelId = group.defaults.customModelId || '';
        } else {
          this.customProviderName = '';
          this.customBaseUrl = '';
          this.customApiType = 'openai-completions';
          this.customModelId = '';
        }
      },

      nextStep() {
        if (this.step < this.totalSteps) this.step++;
      },

      prevStep() {
        if (this.step > 1) this.step--;
      },

      async runSetup() {
        const payload = {
          authChoice: this.selectedAuth,
          authSecret: this.authSecret,
          model: this.model,
          telegramToken: this.telegramToken,
          discordToken: this.discordToken,
          slackBotToken: this.slackBotToken,
          slackAppToken: this.slackAppToken
        };

        if (this.isCustomGroup) {
          payload.customProviderName = this.customProviderName;
          payload.customBaseUrl = this.customBaseUrl;
          payload.customApiType = this.customApiType;
          payload.customModelId = this.customModelId;
        }

        this.log = 'Running...\n';
        this.loading = true;

        try {
          const res = await fetch('/setup/api/run', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify(payload)
          });
          const text = await res.text();
          let j;
          try { j = JSON.parse(text); } catch (_e) { j = { ok: false, output: text }; }
          this.log += (j.output || JSON.stringify(j, null, 2));
          await this.refreshStatus();
        } catch (e) {
          this.log += '\nError: ' + String(e) + '\n';
        } finally {
          this.loading = false;
        }
      },

      openPairingModal() {
        this.pairingChannel = '';
        this.pairingCode = '';
        this.showPairingModal = true;
      },

      async approvePairing() {
        const channel = this.pairingChannel.trim().toLowerCase();
        if (channel !== 'telegram' && channel !== 'discord') {
          alert('Channel must be "telegram" or "discord"');
          return;
        }
        const code = this.pairingCode.trim();
        if (!code) {
          alert('Please enter a pairing code');
          return;
        }
        this.showPairingModal = false;
        this.log += '\nApproving pairing for ' + channel + '...\n';

        try {
          const res = await fetch('/setup/api/pairing/approve', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ channel: channel, code: code })
          });
          const t = await res.text();
          let result;
          try { result = JSON.parse(t); } catch (_e) { result = { ok: false, output: t }; }
          if (result.ok) {
            const msg = result.output || 'Pairing approved successfully';
            this.log += msg + '\n';
          } else {
            const msg = result.output || result.error || 'Unknown error';
            this.log += 'Failed: ' + msg + '\n';
          }
        } catch (e) {
          this.log += 'Error: ' + String(e) + '\n';
        }
      },

      async resetSetup() {
        if (!confirm(this.lang === 'zh' ? '确定重置设置？这将删除配置文件以便重新运行初始化。' : 'Reset setup? This deletes the config file so onboarding can run again.')) return;
        this.log = 'Resetting...\n';
        this.loading = true;

        try {
          const res = await fetch('/setup/api/reset', { method: 'POST', credentials: 'same-origin' });
          const t = await res.text();
          this.log += t + '\n';
          await this.refreshStatus();
        } catch (e) {
          this.log += 'Error: ' + String(e) + '\n';
        } finally {
          this.loading = false;
        }
      },

      async runDoctor() {
        this.log = 'Running doctor...\n';
        this.loading = true;

        try {
          const res = await fetch('/setup/api/doctor', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 'content-type': 'application/json' }
          });
          const text = await res.text();
          let j;
          try { j = JSON.parse(text); } catch (_e) { j = { ok: false, output: text }; }
          this.log += (j.output || JSON.stringify(j, null, 2));
          if (j.ok) {
            this.log += '\nDoctor completed successfully\n';
          } else {
            this.log += '\nDoctor found issues\n';
          }
        } catch (e) {
          this.log += 'Error: ' + String(e) + '\n';
        } finally {
          this.loading = false;
        }
      },

      async exportData() {
        this.exporting = true;
        this.log = 'Preparing export...\n';

        try {
          const res = await fetch('/setup/api/export', { credentials: 'same-origin' });
          if (!res.ok) {
            const text = await res.text();
            let j;
            try { j = JSON.parse(text); } catch (_e) { j = { error: text }; }
            this.log += 'Export failed: ' + (j.error || j.output || text) + '\n';
            return;
          }

          const disposition = res.headers.get('content-disposition') || '';
          const match = disposition.match(/filename="?([^"]+)"?/);
          const filename = match ? match[1] : 'openclaw-export.zip';

          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(url);

          this.log += 'Export downloaded: ' + filename + '\n';
          this.showExportInfo = true;
        } catch (e) {
          this.log += 'Export error: ' + String(e) + '\n';
        } finally {
          this.exporting = false;
        }
      },

      async openDevicesModal() {
        this.showDevicesModal = true;
        await this.loadDevices();
      },

      async loadDevices() {
        this.devicesLoading = true;
        try {
          const j = await this.httpJson('/setup/api/devices');
          const d = j.data;
          if (d) {
            if (Array.isArray(d)) {
              this.devicesPending = d.filter(x => x.status === 'pending');
              this.devicesPaired = d.filter(x => x.status !== 'pending');
            } else {
              this.devicesPending = d.pending || d.pendingRequests || d.requests || [];
              this.devicesPaired = d.devices || d.paired || d.approved || [];
            }
          } else {
            this.devicesPending = [];
            this.devicesPaired = [];
          }
          if (j.raw) {
            this.log += '[devices] ' + j.raw.trim() + '\n';
          }
        } catch (e) {
          this.log += 'Failed to load devices: ' + String(e) + '\n';
        } finally {
          this.devicesLoading = false;
        }
      },

      async approveDevice(requestId) {
        this.devicesLoading = true;
        try {
          const body = requestId ? { requestId } : {};
          const res = await fetch('/setup/api/devices/approve', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify(body)
          });
          const j = await res.json();
          if (j.ok) {
            this.log += 'Device approved\n';
          } else {
            this.log += 'Approve failed: ' + (j.output || j.error || 'Unknown error') + '\n';
          }
          await this.loadDevices();
        } catch (e) {
          this.log += 'Error: ' + String(e) + '\n';
          this.devicesLoading = false;
        }
      },

      async rejectDevice(requestId) {
        this.devicesLoading = true;
        try {
          const res = await fetch('/setup/api/devices/reject', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ requestId })
          });
          const j = await res.json();
          if (j.ok) {
            this.log += 'Device rejected\n';
          } else {
            this.log += 'Reject failed: ' + (j.output || j.error || 'Unknown error') + '\n';
          }
          await this.loadDevices();
        } catch (e) {
          this.log += 'Error: ' + String(e) + '\n';
          this.devicesLoading = false;
        }
      }
    }));
  });
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
</head>
<body class="bg-neutral-100 dark:bg-neutral-950 text-neutral-900 dark:text-neutral-100 min-h-screen font-sans" x-data="setupApp()">
  <div class="max-w-3xl mx-auto px-4 py-12 min-w-[400px]">
    <!-- Language toggle -->
    <div class="flex justify-end mb-2">
      <button @click="toggleLang()" class="text-xs text-neutral-500 hover:text-neutral-700 dark:hover:text-neutral-300 bg-neutral-200 dark:bg-neutral-800 hover:bg-neutral-300 dark:hover:bg-neutral-700 px-3 py-1.5 rounded-lg transition-colors">
        <span x-show="lang === 'en'">中文</span>
        <span x-show="lang === 'zh'">EN</span>
      </button>
    </div>

    <div class="flex justify-center mb-6">
      <picture>
        <source media="(prefers-color-scheme: light)" srcset="https://raw.githubusercontent.com/openclaw/openclaw/main/docs/assets/openclaw-logo-text-dark.png">
        <img src="https://raw.githubusercontent.com/openclaw/openclaw/main/docs/assets/openclaw-logo-text.png" alt="OpenClaw" class="max-w-[280px] h-auto">
      </picture>
    </div>
    <h1 class="text-2xl font-semibold text-center tracking-tight mb-2" x-text="t('title')"></h1>
    <p class="text-neutral-500 text-center text-sm mb-8" x-text="t('subtitle')"></p>

    <div class="bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 rounded-xl p-5 mb-6 shadow-sm dark:shadow-none">
      <div class="flex items-center justify-between">
        <div>
          <span class="text-xs uppercase tracking-wide text-neutral-500 font-medium">🦞 OpenClaw</span>
          <span x-show="openclawVersion" x-text="openclawVersion" class="text-xs text-neutral-400 dark:text-neutral-600 ml-2"></span>
        </div>
        <span x-text="status" class="text-sm" :class="configured ? 'text-emerald-600 dark:text-emerald-400' : 'text-amber-600 dark:text-amber-400'"></span>
      </div>
      <div x-show="configured" class="mt-3 pt-3 border-t border-neutral-200 dark:border-neutral-800 flex flex-wrap gap-4">
        <a href="/openclaw" target="_blank" class="inline-flex items-center gap-2 text-sm text-teal-600 dark:text-teal-400 hover:text-teal-500 dark:hover:text-teal-300 transition-colors">
          <span x-text="t('openUI')"></span>
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
        </a>
        <a x-show="tuiEnabled" href="/tui" target="_blank" class="inline-flex items-center gap-2 text-sm text-purple-600 dark:text-purple-400 hover:text-purple-500 dark:hover:text-purple-300 transition-colors">
          <span x-text="t('openTerminal')"></span>
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        </a>
      </div>
    </div>

    <!-- Configured view -->
    <div x-show="isReady && configured" x-cloak class="space-y-6">
      <div class="bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 rounded-xl p-6 shadow-sm dark:shadow-none">
        <h2 class="text-lg font-semibold mb-1" x-text="t('setupComplete')"></h2>
        <p class="text-neutral-500 text-sm" x-text="t('setupCompleteDesc')"></p>
      </div>

            <dl class="space-y-2 text-sm">
              <div class="flex justify-between">
                <dt class="text-neutral-500" x-text="t('provider')"></dt>
                <dd x-text="selectedGroup || '—'" class="text-neutral-700 dark:text-neutral-300"></dd>
              </div>
              <div class="flex justify-between">
                <dt class="text-neutral-500" x-text="t('auth')"></dt>
                <dd x-text="selectedAuth || '—'" class="text-neutral-700 dark:text-neutral-300"></dd>
              </div>
              <div x-show="isCustomGroup" class="flex justify-between">
                <dt class="text-neutral-500">Base URL</dt>
                <dd x-text="customBaseUrl || '—'" class="text-neutral-700 dark:text-neutral-300 truncate ml-4 max-w-[200px]"></dd>
              </div>
              <div x-show="isCustomGroup" class="flex justify-between">
                <dt class="text-neutral-500">API Type</dt>
                <dd x-text="customApiType || '—'" class="text-neutral-700 dark:text-neutral-300"></dd>
              </div>
              <div x-show="isCustomGroup" class="flex justify-between">
                <dt class="text-neutral-500">Model ID</dt>
                <dd x-text="customModelId || '—'" class="text-neutral-700 dark:text-neutral-300"></dd>
              </div>
              <div x-show="!isCustomGroup" class="flex justify-between">
                <dt class="text-neutral-500" x-text="t('modelLabel')"></dt>
                <dd x-text="model || t('default')" class="text-neutral-700 dark:text-neutral-300"></dd>
              </div>
              <div class="flex justify-between">
                <dt class="text-neutral-500" x-text="t('channels')"></dt>
                <dd class="text-neutral-700 dark:text-neutral-300">
                  <span x-show="telegramToken" class="inline-flex items-center gap-1 bg-sky-100 dark:bg-sky-500/20 text-sky-600 dark:text-sky-400 px-2 py-0.5 rounded text-xs mr-1">Telegram</span>
                  <span x-show="discordToken" class="inline-flex items-center gap-1 bg-indigo-100 dark:bg-indigo-500/20 text-indigo-600 dark:text-indigo-400 px-2 py-0.5 rounded text-xs mr-1">Discord</span>
                  <span x-show="slackBotToken && slackAppToken" class="inline-flex items-center gap-1 bg-green-100 dark:bg-green-500/20 text-green-600 dark:text-green-400 px-2 py-0.5 rounded text-xs">Slack</span>
                  <span x-show="!telegramToken && !discordToken && !(slackBotToken && slackAppToken)" class="text-neutral-500" x-text="t('none')"></span>
                </dd>
              </div>
            </dl>
          </div>
          <div class="flex flex-wrap gap-3 mb-4">
            <button @click="runSetup()" :disabled="loading" class="bg-red-600 hover:bg-red-700 disabled:opacity-50 disabled:cursor-not-allowed text-white px-6 py-3 rounded-lg font-medium transition-colors">
              <span x-show="!loading" x-text="t('runSetupBtn')"></span>
              <span x-show="loading" class="flex items-center gap-2"><svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg><span x-text="t('running')"></span></span>
            </button>
            <button @click="resetSetup()" :disabled="loading" class="text-neutral-500 hover:text-neutral-700 dark:hover:text-neutral-300 hover:bg-neutral-100 dark:hover:bg-neutral-800 disabled:opacity-50 disabled:cursor-not-allowed px-4 py-3 rounded-lg font-medium transition-colors" x-text="t('reset')"></button>
          </div>
          <div x-show="log" class="bg-neutral-100 dark:bg-neutral-950 border border-neutral-200 dark:border-neutral-800 rounded-lg p-4 font-mono text-xs text-neutral-600 dark:text-neutral-400 whitespace-pre-wrap max-h-64 overflow-y-auto" x-text="log"></div>
          <p class="text-xs text-neutral-500 dark:text-neutral-600 mt-4" x-text="t('resetNote')"></p>
        </div>
      </div>

      <!-- Nav buttons -->
      <div class="flex justify-between mt-6">
        <button x-show="step > 1" @click="prevStep()" class="flex items-center gap-2 text-neutral-500 hover:text-neutral-700 dark:text-neutral-400 dark:hover:text-neutral-200 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
          <span x-text="t('back')"></span>
        </button>
        <div x-show="step === 1"></div>
        <button x-show="step < totalSteps" @click="nextStep()" class="flex items-center gap-2 bg-neutral-200 dark:bg-neutral-800 hover:bg-neutral-300 dark:hover:bg-neutral-700 text-neutral-800 dark:text-neutral-200 px-5 py-2.5 rounded-lg font-medium transition-colors ml-auto">
          <span x-text="t('next')"></span>
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        </button>
      </div>
    </div>

    <!-- Devices Modal -->
    <div x-show="showDevicesModal" x-cloak class="fixed inset-0 bg-black/50 dark:bg-black/70 flex items-center justify-center z-50" @click.self="showDevicesModal = false">
      <div class="bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 rounded-xl p-6 w-full max-w-lg mx-4 shadow-xl dark:shadow-none max-h-[80vh] overflow-y-auto">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-lg font-semibold" x-text="t('manageDevices')"></h3>
          <div class="flex items-center gap-2">
            <button @click="loadDevices()" :disabled="devicesLoading" class="text-neutral-500 hover:text-neutral-700 dark:hover:text-neutral-300 p-2 rounded-lg hover:bg-neutral-100 dark:hover:bg-neutral-800 transition-colors">
              <svg class="w-4 h-4" :class="devicesLoading && 'animate-spin'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
            </button>
            <button @click="showDevicesModal = false" class="text-neutral-500 hover:text-neutral-700 dark:hover:text-neutral-300 p-2 rounded-lg hover:bg-neutral-100 dark:hover:bg-neutral-800 transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
          </div>
        </div>
        <p class="text-sm text-neutral-500 dark:text-neutral-400 mb-4" x-text="t('devicesModalDesc')"></p>
        <button @click="approveDevice()" :disabled="devicesLoading" class="w-full mb-4 bg-violet-600 hover:bg-violet-700 disabled:opacity-50 disabled:cursor-not-allowed text-white px-4 py-2.5 rounded-lg font-medium transition-colors">
          <span x-show="!devicesLoading" x-text="t('approveLatest')"></span>
          <span x-show="devicesLoading" class="flex items-center justify-center gap-2"><svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg><span x-text="t('loading')"></span></span>
        </button>
        <div class="space-y-4">
          <div>
            <h4 class="text-xs uppercase tracking-wide text-neutral-500 font-medium mb-2" x-text="t('pendingRequests')"></h4>
            <div x-show="devicesPending.length === 0 && !devicesLoading" class="text-sm text-neutral-400 dark:text-neutral-600 bg-neutral-50 dark:bg-neutral-800/50 rounded-lg p-3 border border-neutral-200 dark:border-neutral-800" x-text="t('noPending')"></div>
            <div class="space-y-2">
              <template x-for="req in devicesPending" :key="req.requestId || req.id">
                <div class="flex items-center justify-between bg-violet-50 dark:bg-violet-900/20 border border-violet-200 dark:border-violet-800 rounded-lg p-3">
                  <div class="min-w-0 flex-1">
                    <p class="text-sm font-medium text-violet-700 dark:text-violet-300 truncate" x-text="req.requestId || req.id"></p>
                    <p x-show="req.createdAt" class="text-xs text-violet-500 dark:text-violet-400" x-text="req.createdAt ? new Date(req.createdAt).toLocaleString() : ''"></p>
                  </div>
                  <div class="flex gap-2 ml-3 shrink-0">
                    <button @click="approveDevice(req.requestId || req.id)" :disabled="devicesLoading" class="bg-emerald-600 hover:bg-emerald-700 disabled:opacity-50 text-white px-3 py-1.5 rounded-lg text-xs font-medium transition-colors" x-text="t('approve')"></button>
                    <button @click="rejectDevice(req.requestId || req.id)" :disabled="devicesLoading" class="bg-red-600 hover:bg-red-700 disabled:opacity-50 text-white px-3 py-1.5 rounded-lg text-xs font-medium transition-colors" x-text="t('reject')"></button>
                  </div>
                </div>
              </template>
            </div>
          </div>
          <div>
            <h4 class="text-xs uppercase tracking-wide text-neutral-500 font-medium mb-2" x-text="t('pairedDevices')"></h4>
            <div x-show="devicesPaired.length === 0 && !devicesLoading" class="text-sm text-neutral-400 dark:text-neutral-600 bg-neutral-50 dark:bg-neutral-800/50 rounded-lg p-3 border border-neutral-200 dark:border-neutral-800" x-text="t('noPaired')"></div>
            <div class="space-y-2">
              <template x-for="dev in devicesPaired" :key="dev.deviceId || dev.id">
                <div class="flex items-center justify-between bg-neutral-50 dark:bg-neutral-800/50 border border-neutral-200 dark:border-neutral-800 rounded-lg p-3">
                  <div class="min-w-0 flex-1">
                    <p class="text-sm font-medium text-neutral-700 dark:text-neutral-300 truncate" x-text="dev.deviceId || dev.id"></p>
                    <p class="text-xs text-neutral-500 dark:text-neutral-400">
                      <span x-show="dev.role" x-text="dev.role" class="bg-neutral-200 dark:bg-neutral-700 px-1.5 py-0.5 rounded mr-1"></span>
                      <span x-show="dev.createdAt" x-text="dev.createdAt ? new Date(dev.createdAt).toLocaleString() : ''"></span>
                    </p>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Export Info Modal -->
    <div x-show="showExportInfo" x-cloak class="fixed inset-0 bg-black/50 dark:bg-black/70 flex items-center justify-center z-50" @click.self="showExportInfo = false">
      <div class="bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 rounded-xl p-6 w-full max-w-md mx-4 shadow-xl dark:shadow-none">
        <h3 class="text-lg font-semibold mb-4" x-text="t('unzipTitle')"></h3>
        <p class="text-sm text-neutral-600 dark:text-neutral-400 mb-4" x-text="t('unzipDesc')"></p>
        <div class="space-y-4">
          <div>
            <p class="text-xs uppercase tracking-wide text-neutral-500 font-medium mb-2" x-text="t('macLinux')"></p>
            <code class="block bg-neutral-100 dark:bg-neutral-950 border border-neutral-200 dark:border-neutral-800 rounded-lg px-4 py-3 text-sm text-neutral-700 dark:text-neutral-300 font-mono">unzip -P YOUR_PASSWORD openclaw-export-*.zip</code>
          </div>
          <div>
            <p class="text-xs uppercase tracking-wide text-neutral-500 font-medium mb-2" x-text="t('windowsPs')"></p>
            <p class="text-sm text-neutral-600 dark:text-neutral-400" x-text="t('windowsPsDesc')"></p>
          </div>
          <div>
            <p class="text-xs uppercase tracking-wide text-neutral-500 font-medium mb-2" x-text="t('using7z')"></p>
            <code class="block bg-neutral-100 dark:bg-neutral-950 border border-neutral-200 dark:border-neutral-800 rounded-lg px-4 py-3 text-sm text-neutral-700 dark:text-neutral-300 font-mono">7z x -pYOUR_PASSWORD openclaw-export-*.zip</code>
          </div>
        </div>
        <button @click="showExportInfo = false" class="w-full mt-6 bg-neutral-100 dark:bg-neutral-800 hover:bg-neutral-200 dark:hover:bg-neutral-700 text-neutral-700 dark:text-neutral-300 px-4 py-3 rounded-lg font-medium border border-neutral-300 dark:border-neutral-700 transition-colors" x-text="t('close')"></button>
      </div>
    </div>

    <!-- Pairing Modal -->
    <div x-show="showPairingModal" x-cloak class="fixed inset-0 bg-black/50 dark:bg-black/70 flex items-center justify-center z-50" @click.self="showPairingModal = false">
      <div class="bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 rounded-xl p-6 w-full max-w-sm mx-4 shadow-xl dark:shadow-none">
        <h3 class="text-lg font-semibold mb-4" x-text="t('approveChannelAccess')"></h3>
        <div class="space-y-4">
          <div>
            <label class="block text-xs uppercase tracking-wide text-neutral-500 font-medium mb-2" x-text="t('channel')"></label>
            <select x-model="pairingChannel" class="w-full bg-neutral-50 dark:bg-neutral-800 border border-neutral-300 dark:border-neutral-700 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-red-500 transition-colors">
              <option value="" x-text="t('selectChannel')"></option>
              <option value="telegram">Telegram</option>
              <option value="discord">Discord</option>
            </select>
          </div>
          <div>
            <label class="block text-xs uppercase tracking-wide text-neutral-500 font-medium mb-2" x-text="t('pairingCode')"></label>
            <input x-model="pairingCode" type="text" placeholder="e.g. 3EY4PUYS" class="w-full bg-neutral-50 dark:bg-neutral-800 border border-neutral-300 dark:border-neutral-700 rounded-lg px-4 py-3 text-sm placeholder-neutral-400 dark:placeholder-neutral-600 focus:outline-none focus:border-red-500 transition-colors" />
          </div>
          <div class="flex gap-3 pt-2">
            <button @click="approvePairing()" class="flex-1 bg-red-600 hover:bg-red-700 text-white px-4 py-3 rounded-lg font-medium transition-colors" x-text="t('approve')"></button>
            <button @click="showPairingModal = false" class="flex-1 bg-neutral-100 dark:bg-neutral-800 hover:bg-neutral-200 dark:hover:bg-neutral-700 text-neutral-700 dark:text-neutral-300 px-4 py-3 rounded-lg font-medium border border-neutral-300 dark:border-neutral-700 transition-colors" x-text="t('cancel')"></button>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
