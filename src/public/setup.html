      t(key) {
        return (this.translations[this.lang] || this.translations.en)[key] || key;
      },

      toggleLang() {
        this.lang = this.lang === 'en' ? 'zh' : 'en';
      },

      get canRunSetup() {
        if (!this.providers.length) return false;
        if (!this.providerModelOptions.length) return false;
        if (!this.agents.length) return false;
        for (const agent of this.agents) {
          if (!String(agent.name || '').trim()) return false;
          if (!String(agent.providerId || '').trim()) return false;
          if (!String(agent.model || '').trim()) return false;
        }
        for (const p of this.providers) {
          if (this.isProviderFromEnvFor(p) && !(this.envProvider && this.envProvider.valid)) {
            return false;
          }
        }
        return true;
      },

      get canGoNext() {
        if (this.step >= this.totalSteps) return false;
        if (this.step === 1) {
          return this.isProviderStepValid();
        }
        return true;
      },

      get providerModelOptions() {
        return this.providers
          .map(p => {
            const model = this.getProviderModelValue(p);
            if (!model) return null;
            return {
              id: p.id,
              label: this.getProviderDisplayLabel(p),
              model,
              authChoice: p.selectedAuth,
            };
          })
          .filter(Boolean);
      },

      async init() {
        await this.refreshStatus();
        window.addEventListener('beforeunload', () => this.stopDevicesPolling());
      },

      async httpJson(url, opts = {}) {
        opts.credentials = 'same-origin';
        if (!opts.cache) {
          opts.cache = 'no-store';
        }
        const res = await fetch(url, opts);
        if (!res.ok) {
          const t = await res.text();
          throw new Error('HTTP ' + res.status + ': ' + (t || res.statusText));
        }
        return res.json();
      },

      async refreshStatus() {
        this.status = this.t('loading');
        try {
          const j = await this.httpJson('/setup/api/status');
          this.configured = j.configured;
          this.openclawVersion = j.openclawVersion || '';
          this.tuiEnabled = j.tuiEnabled || false;
          this.status = j.configured ? this.t('statusConfigured') : this.t('statusNotConfigured');
          this.authGroups = j.authGroups || [];
          this.envProvider = j.envProvider || this.envProvider;
          if (this.authGroups.length > 0 && this.providers.length === 0) {
            this.providers = [this.createProviderConfig()];
          }
          if (this.agents.length === 0) {
            this.agents = [{ id: this.newId('agent'), name: 'primary', providerId: '', model: '' }];
          }
          this.syncAgentProviders();
          if (this.envProvider.enabled && !this.envProvider.valid && this.envProvider.error) {
            this.log += '[ProviderFromEnv] ' + this.envProvider.error + '\n';
          }
          if (j.channelsAddHelp && j.channelsAddHelp.indexOf('telegram') === -1) {
            this.log += '\nNote: this openclaw build does not list telegram in `channels add --help`. Telegram auto-add will be skipped.\n';
          }
          this.isReady = true;
        } catch (e) {
          this.status = 'Error: ' + String(e);
          this.isReady = true;
        }
      },

      newId(prefix) {
        return prefix + '-' + Math.random().toString(36).slice(2, 10);
      },

      getGroupByValue(value) {
        return this.authGroups.find(g => g.value === value);
      },

      isCustomGroupFor(provider) {
        const group = this.getGroupByValue(provider.selectedGroup);
        return group && group.custom === true;
      },

      isProviderFromEnvFor(provider) {
        return provider.selectedGroup === 'provider-from-env' || provider.selectedAuth === 'provider-from-env';
      },

      createProviderConfig() {
        const preferredGroup = this.envProvider.enabled ? 'provider-from-env' : (this.authGroups[0] && this.authGroups[0].value) || '';
        const provider = {
          id: this.newId('provider'),
          selectedGroup: preferredGroup,
          authChoices: [],
          selectedAuth: '',
          authSecret: '',
          model: '',
          customProviderName: '',
          customBaseUrl: '',
          customApiType: 'openai-completions',
          customModelId: '',
        };
        this.updateProviderAuthChoices(provider);
        return provider;
      },

      updateProviderAuthChoices(provider) {
        const group = this.getGroupByValue(provider.selectedGroup);
        provider.authChoices = (group && group.options) ? group.options : [];
        provider.selectedAuth = provider.authChoices.length > 0 ? provider.authChoices[0].value : '';
        if (group && group.value === 'provider-from-env') {
          provider.selectedAuth = 'provider-from-env';
        }
        if (group && group.defaults) {
          provider.customProviderName = group.defaults.customProviderName || '';
          provider.customBaseUrl = group.defaults.customBaseUrl || '';
          provider.customApiType = group.defaults.customApiType || 'openai-completions';
          provider.customModelId = group.defaults.customModelId || '';
        } else {
          provider.customProviderName = '';
          provider.customBaseUrl = '';
          provider.customApiType = 'openai-completions';
          provider.customModelId = '';
        }
        if (this.isProviderFromEnvFor(provider) && this.envProvider && this.envProvider.values) {
          provider.authSecret = this.envProvider.values.providerApiKey || '';
          provider.customProviderName = this.envProvider.values.aiProvider || provider.customProviderName;
          provider.customBaseUrl = this.envProvider.values.providerBaseUrl || provider.customBaseUrl;
        }
        this.syncAgentProviders();
      },

      addProvider() {
        this.providers.push(this.createProviderConfig());
        this.syncAgentProviders();
      },

      removeProvider(index) {
        if (this.providers.length <= 1) return;
        const removed = this.providers.splice(index, 1)[0];
        if (!removed) return;
        for (const agent of this.agents) {
          if (agent.providerId === removed.id) {
            agent.providerId = '';
            agent.model = '';
          }
        }
        this.syncAgentProviders();
      },

      getProviderModelValue(provider) {
        if (!provider) return '';
        if (this.isCustomGroupFor(provider)) {
          const providerName = String(provider.customProviderName || '').trim();
          const modelId = String(provider.customModelId || '').trim();
          return providerName && modelId ? `${providerName}/${modelId}` : '';
        }
        return String(provider.model || '').trim();
      },

      getProviderDisplayLabel(provider) {
        const group = this.getGroupByValue(provider.selectedGroup);
        const base = group ? group.label : (provider.selectedGroup || 'Provider');
        const model = this.getProviderModelValue(provider);
        return model ? `${base} (${model})` : base;
      },

      isProviderStepValid() {
        if (!Array.isArray(this.providers) || this.providers.length === 0) return false;
        for (const p of this.providers) {
          const group = String(p.selectedGroup || '').trim();
          const model = this.getProviderModelValue(p);
          if (!group || !model) continue;
          if (this.isProviderFromEnvFor(p) && !(this.envProvider && this.envProvider.valid)) {
            continue;
          }
          return true;
        }
        return false;
      },

      ensureProviderStepValid() {
        const ok = this.isProviderStepValid();
        this.navError = ok ? '' : this.t('providerRequiredNext');
        return ok;
      },

      addAgent() {
        this.agents.push({
          id: this.newId('agent'),
          name: `agent${this.agents.length}`,
          providerId: '',
          model: '',
        });
      },

      removeAgent(index) {
        if (this.agents.length <= 1) return;
        this.agents.splice(index, 1);
      },

      syncAgentProviders() {
        const options = this.providerModelOptions;
        const providerIdSet = new Set(options.map(o => o.id));
        for (const agent of this.agents) {
          if (!providerIdSet.has(agent.providerId)) {
            agent.providerId = '';
            agent.model = '';
            continue;
          }
          const selected = options.find(o => o.id === agent.providerId);
          if (selected && agent.model !== selected.model) {
            agent.model = selected.model;
          }
        }
        if (options.length > 0) {
          for (const agent of this.agents) {
            if (!agent.providerId) {
              agent.providerId = options[0].id;
              agent.model = options[0].model;
            }
          }
        }
      },

      onAgentProviderChange(agent) {
        const selected = this.providerModelOptions.find(o => o.id === agent.providerId);
        agent.model = selected ? selected.model : '';
      },

      buildSetupPayload() {
        const providerPayload = this.providers.map(p => ({
          id: p.id,
          authChoice: p.selectedAuth,
          authSecret: p.authSecret,
          model: this.getProviderModelValue(p),
          customProviderName: p.customProviderName,
          customBaseUrl: p.customBaseUrl,
          customApiType: p.customApiType,
          customModelId: p.customModelId,
          selectedGroup: p.selectedGroup,
        }));

        const payload = {
          providers: providerPayload,
          agents: this.agents.map(a => ({
            name: String(a.name || '').trim(),
            providerId: a.providerId,
            model: String(a.model || '').trim(),
          })),
          authChoice: providerPayload[0] ? providerPayload[0].authChoice : '',
          authSecret: providerPayload[0] ? providerPayload[0].authSecret : '',
          model: providerPayload[0] ? providerPayload[0].model : '',
          telegramToken: this.telegramToken,
          discordToken: this.discordToken,
          slackBotToken: this.slackBotToken,
          slackAppToken: this.slackAppToken
        };

        if (providerPayload[0] && providerPayload[0].authChoice === 'custom-provider') {
          payload.customProviderName = providerPayload[0].customProviderName;
          payload.customBaseUrl = providerPayload[0].customBaseUrl;
          payload.customApiType = providerPayload[0].customApiType;
          payload.customModelId = providerPayload[0].customModelId;
        }

        return payload;
      },

      payloadSignature(payload) {
        return JSON.stringify(payload);
      },

      async previewChanges(payloadOverride = null, options = {}) {
        if (this.previewing) return false;

        const payload = payloadOverride || this.buildSetupPayload();
        const signature = this.payloadSignature(payload);
        const force = Boolean(options.force);
        const suppressLog = Boolean(options.suppressLog);

        if (!force && this.previewResult && this.previewPayloadSignature === signature) {
          return true;
        }

        for (const p of this.providers) {
          if (this.isProviderFromEnvFor(p) && !(this.envProvider && this.envProvider.valid)) {
            const msg = '[ProviderFromEnv] ' + ((this.envProvider && this.envProvider.error) || 'Invalid provider env variables');
            this.previewError = msg;
            if (!suppressLog) this.log += '\n' + msg + '\n';
            return false;
          }
        }

        this.previewing = true;
        this.previewError = '';

        try {
          const res = await fetch('/setup/api/preview', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify(payload)
          });
          const text = await res.text();
          let j;
          try { j = JSON.parse(text); } catch (_e) { j = { ok: false, error: text || 'invalid response' }; }
          if (!res.ok || !j.ok) {
            throw new Error(j.error || j.output || ('HTTP ' + res.status));
          }
          this.previewResult = j;
          this.previewPayloadSignature = signature;
          if (!suppressLog) {
            const changed = j.summary && typeof j.summary.changedFiles === 'number' ? j.summary.changedFiles : 0;
            this.log += '\n[preview] changedFiles=' + changed + '\n';
          }
          return true;
        } catch (e) {
          const msg = this.t('previewFailed') + ': ' + String(e);
          this.previewError = msg;
          if (!suppressLog) this.log += '\n' + msg + '\n';
          return false;
        } finally {
          this.previewing = false;
        }
      },

      async ensureStep4Preview(force = false) {
        if (this.step !== 4) return;
        if (!this.canRunSetup) return;
        const payload = this.buildSetupPayload();
        await this.previewChanges(payload, { force, suppressLog: true });
      },

      goToStep(targetStep) {
        const s = Number(targetStep);
        if (!Number.isInteger(s) || s < 1 || s > this.totalSteps) return;
        if (s === this.step) return;
        if (s > this.step && this.step === 1 && !this.ensureProviderStepValid()) return;
        this.navError = '';
        this.step = s;
        if (this.step === 4) {
          this.ensureStep4Preview().catch(() => {});
        }
      },

      nextStep() {
        if (this.step === 1 && !this.ensureProviderStepValid()) return;
        this.navError = '';
        if (this.step < this.totalSteps) this.step++;
        if (this.step === 4) {
          this.ensureStep4Preview().catch(() => {});
        }
      },

      prevStep() {
        this.navError = '';
        if (this.step > 1) this.step--;
      },

      async runSetup() {
        for (const p of this.providers) {
          if (this.isProviderFromEnvFor(p) && !(this.envProvider && this.envProvider.valid)) {
            this.log += '\n[ProviderFromEnv] ' + ((this.envProvider && this.envProvider.error) || 'Invalid provider env variables') + '\n';
            return;
          }
        }

        const payload = this.buildSetupPayload();
        const okPreview = await this.previewChanges(payload, { suppressLog: true });
        if (!okPreview) {
          this.log += '\n' + this.t('previewFailed') + '\n';
          return;
        }

        this.log = 'Running...\n';
        this.loading = true;

        try {
          const res = await fetch('/setup/api/run', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify(payload)
          });
          const text = await res.text();
          let j;
          try { j = JSON.parse(text); } catch (_e) { j = { ok: false, output: text }; }
          this.log += (j.output || JSON.stringify(j, null, 2));
          await this.refreshStatus();
        } catch (e) {
          this.log += '\nError: ' + String(e) + '\n';
        } finally {
          this.loading = false;
        }
      },

      openPairingModal() {
        this.pairingChannel = '';
        this.pairingCode = '';
        this.showPairingModal = true;
      },

      async approvePairing() {
        const channel = this.pairingChannel.trim().toLowerCase();
        if (channel !== 'telegram' && channel !== 'discord') {
          alert('Channel must be "telegram" or "discord"');
          return;
        }
        const code = this.pairingCode.trim();
        if (!code) {
          alert('Please enter a pairing code');
          return;
        }
        this.showPairingModal = false;
        this.log += '\nApproving pairing for ' + channel + '...\n';

        try {
          const res = await fetch('/setup/api/pairing/approve', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ channel: channel, code: code })
          });
          const t = await res.text();
          let result;
          try { result = JSON.parse(t); } catch (_e) { result = { ok: false, output: t }; }
          if (result.ok) {
            const msg = result.output || 'Pairing approved successfully';
            this.log += msg + '\n';
          } else {
            const msg = result.output || result.error || 'Unknown error';
            this.log += 'Failed: ' + msg + '\n';
          }
        } catch (e) {
          this.log += 'Error: ' + String(e) + '\n';
        }
      },

      async resetSetup() {
        if (!confirm(this.lang === 'zh' ? '确定重置设置？这将删除配置文件以便重新运行初始化。' : 'Reset setup? This deletes the config file so onboarding can run again.')) return;
        this.log = 'Resetting...\n';
        this.loading = true;

        try {
          const res = await fetch('/setup/api/reset', { method: 'POST', credentials: 'same-origin' });
          const t = await res.text();
          this.log += t + '\n';
          await this.refreshStatus();
        } catch (e) {
          this.log += 'Error: ' + String(e) + '\n';
        } finally {
          this.loading = false;
        }
      },

      async runDoctor() {
        this.log = 'Running doctor...\n';
        this.loading = true;

        try {
          const res = await fetch('/setup/api/doctor', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 'content-type': 'application/json' }
          });
          const text = await res.text();
          let j;
          try { j = JSON.parse(text); } catch (_e) { j = { ok: false, output: text }; }
          this.log += (j.output || JSON.stringify(j, null, 2));
          if (j.ok) {
            this.log += '\nDoctor completed successfully\n';
          } else {
            this.log += '\nDoctor found issues\n';
          }
        } catch (e) {
          this.log += 'Error: ' + String(e) + '\n';
        } finally {
          this.loading = false;
        }
      },

      async exportData() {
        this.exporting = true;
        this.log = 'Preparing export...\n';

        try {
          const res = await fetch('/setup/api/export', { credentials: 'same-origin' });
          if (!res.ok) {
            const text = await res.text();
            let j;
            try { j = JSON.parse(text); } catch (_e) { j = { error: text }; }
            this.log += 'Export failed: ' + (j.error || j.output || text) + '\n';
            return;
          }

          const disposition = res.headers.get('content-disposition') || '';
          const match = disposition.match(/filename="?([^"]+)"?/);
          const filename = match ? match[1] : 'openclaw-export.zip';

          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(url);

          this.log += 'Export downloaded: ' + filename + '\n';
          this.showExportInfo = true;
        } catch (e) {
          this.log += 'Export error: ' + String(e) + '\n';
        } finally {
          this.exporting = false;
        }
      },

      async openDevicesModal() {
        this.showDevicesModal = true;
        await this.loadDevices();
        this.startDevicesPolling();
      },

      closeDevicesModal() {
        this.showDevicesModal = false;
        this.stopDevicesPolling();
      },

      startDevicesPolling() {
        this.stopDevicesPolling();
        this.devicesPoller = setInterval(() => {
          if (this.showDevicesModal && !this.devicesRequestInFlight) {
            this.loadDevices({ silent: true });
          }
        }, 1500);
      },

      stopDevicesPolling() {
        if (this.devicesPoller) {
          clearInterval(this.devicesPoller);
          this.devicesPoller = null;
        }
      },

      normalizeDeviceLists(data) {
        const pending = [];
        const paired = [];
        const pendingKeys = new Set();
        const pairedKeys = new Set();
        const pendingStatuses = new Set(['pending', 'requested', 'requesting', 'awaiting', 'waiting', 'unapproved']);
        const approvedStatuses = new Set(['approved', 'paired', 'active', 'connected']);

        function normalizeEntry(entry) {
          if (!entry || typeof entry !== 'object') return null;
          const normalized = { ...entry };
          if (normalized.requestId == null && normalized.request_id != null) normalized.requestId = normalized.request_id;
          if (normalized.deviceId == null && normalized.device_id != null) normalized.deviceId = normalized.device_id;
          if (normalized.createdAt == null && normalized.created_at != null) normalized.createdAt = normalized.created_at;
          return normalized;
        }

        function getKey(entry, prefix) {
          const id = entry.requestId ?? entry.deviceId ?? entry.id ?? entry.request_id ?? entry.device_id;
          return prefix + ':' + (id == null ? JSON.stringify(entry) : String(id));
        }

        function pushUnique(list, keySet, entry, prefix) {
          const key = getKey(entry, prefix);
          if (keySet.has(key)) return;
          keySet.add(key);
          list.push(entry);
        }

        function looksLikeDeviceEntry(value) {
          if (!value || typeof value !== 'object' || Array.isArray(value)) return false;
          return (
            Object.prototype.hasOwnProperty.call(value, 'requestId') ||
            Object.prototype.hasOwnProperty.call(value, 'request_id') ||
            Object.prototype.hasOwnProperty.call(value, 'deviceId') ||
            Object.prototype.hasOwnProperty.call(value, 'device_id') ||
            (
              Object.prototype.hasOwnProperty.call(value, 'id') &&
              (
                Object.prototype.hasOwnProperty.call(value, 'status') ||
                Object.prototype.hasOwnProperty.call(value, 'state') ||
                Object.prototype.hasOwnProperty.call(value, 'createdAt') ||
                Object.prototype.hasOwnProperty.call(value, 'created_at')
              )
            )
          );
        }

        function getContextByKey(key) {
          const lower = String(key || '').toLowerCase();
          if (lower.includes('pending') || lower.includes('request')) return 'pending';
          if (lower.includes('paired') || lower.includes('approved') || lower === 'devices' || lower.includes('device')) return 'paired';
          return '';
        }

        function classify(entry, context) {
          const normalized = normalizeEntry(entry);
          if (!normalized) return;
          const status = String(normalized.status ?? normalized.state ?? '').toLowerCase();
          if (context === 'pending' || pendingStatuses.has(status)) {
            pushUnique(pending, pendingKeys, normalized, 'pending');
            return;
          }
          if (context === 'paired' || approvedStatuses.has(status)) {
            pushUnique(paired, pairedKeys, normalized, 'paired');
            return;
          }
          if (normalized.requestId && !normalized.deviceId) {
            pushUnique(pending, pendingKeys, normalized, 'pending');
            return;
          }
          pushUnique(paired, pairedKeys, normalized, 'paired');
        }

        function walk(node, context) {
          if (!node) return;

          if (Array.isArray(node)) {
            for (const item of node) {
              if (looksLikeDeviceEntry(item)) {
                classify(item, context);
              } else {
                walk(item, context);
              }
            }
            return;
          }

          if (typeof node !== 'object') return;

          if (looksLikeDeviceEntry(node)) {
            classify(node, context);
            return;
          }

          for (const [key, val] of Object.entries(node)) {
            const nextContext = getContextByKey(key) || context;
            walk(val, nextContext);
          }
        }

        walk(data, '');

        function toTs(entry) {
          const ts = Date.parse(String(entry.createdAt ?? ''));
          return Number.isNaN(ts) ? 0 : ts;
        }
        pending.sort((a, b) => toTs(b) - toTs(a));
        paired.sort((a, b) => toTs(b) - toTs(a));

        return { pending, paired };
      },

      async loadDevices(opts = {}) {
        const silent = Boolean(opts.silent);
        if (this.devicesRequestInFlight) return;
        this.devicesRequestInFlight = true;
        if (!silent) {
          this.devicesLoading = true;
        }
        try {
          const j = await this.httpJson('/setup/api/devices?ts=' + Date.now());
          if (Array.isArray(j.pending) || Array.isArray(j.paired)) {
            this.devicesPending = Array.isArray(j.pending) ? j.pending : [];
            this.devicesPaired = Array.isArray(j.paired) ? j.paired : [];
          } else {
            const normalized = this.normalizeDeviceLists(j.data);
            this.devicesPending = normalized.pending;
            this.devicesPaired = normalized.paired;
          }
          if (j.raw && !silent) {
            this.log += '[devices] ' + j.raw.trim() + '\n';
          }
        } catch (e) {
          this.log += 'Failed to load devices: ' + String(e) + '\n';
        } finally {
          this.devicesRequestInFlight = false;
          if (!silent) {
            this.devicesLoading = false;
          }
        }
      },

      async approveDevice(requestId) {
        this.devicesLoading = true;
        try {
          const body = requestId ? { requestId } : {};
          const res = await fetch('/setup/api/devices/approve', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify(body)
          });
          const j = await res.json();
          if (j.ok) {
            this.log += 'Device approved\n';
          } else {
            this.log += 'Approve failed: ' + (j.output || j.error || 'Unknown error') + '\n';
          }
          await this.loadDevices();
        } catch (e) {
          this.log += 'Error: ' + String(e) + '\n';
          this.devicesLoading = false;
        }
      },

      async rejectDevice(requestId) {
        this.devicesLoading = true;
        try {
          const res = await fetch('/setup/api/devices/reject', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ requestId })
          });
          const j = await res.json();
          if (j.ok) {
            this.log += 'Device rejected\n';
          } else {
            this.log += 'Reject failed: ' + (j.output || j.error || 'Unknown error') + '\n';
          }
          await this.loadDevices();
        } catch (e) {
          this.log += 'Error: ' + String(e) + '\n';
          this.devicesLoading = false;
        }
      }
    }));
  });
  </script>

            <div class="flex items-center gap-3 mb-3">
              <div class="w-10 h-10 bg-emerald-500/20 rounded-lg flex items-center justify-center">
                <svg class="w-5 h-5 text-emerald-600 dark:text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
              </div>
              <span class="font-medium text-emerald-700 dark:text-emerald-300" x-text="t('exportData')"></span>
            </div>
            <p class="text-sm text-emerald-600/80 dark:text-emerald-400/70 flex-1" x-text="t('exportDataDesc')"></p>
            <button @click="exportData()" :disabled="loading || exporting" class="w-full mt-4 bg-emerald-100 dark:bg-emerald-900/40 hover:bg-emerald-200 dark:hover:bg-emerald-900/60 disabled:opacity-50 disabled:cursor-not-allowed text-emerald-700 dark:text-emerald-300 px-4 py-2.5 rounded-lg font-medium border border-emerald-300 dark:border-emerald-700 transition-colors">
              <span x-show="!exporting" x-text="t('exportData')"></span>
              <span x-show="exporting" class="flex items-center justify-center gap-2"><svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg><span x-text="t('exporting')"></span></span>
            </button>
          </div>
        </div>
        <div x-show="log" class="bg-neutral-100 dark:bg-neutral-950 border border-neutral-200 dark:border-neutral-800 rounded-lg p-4 font-mono text-xs text-neutral-600 dark:text-neutral-400 whitespace-pre-wrap max-h-64 overflow-y-auto" x-text="log"></div>
      </div>

      <div class="bg-white dark:bg-neutral-900 border border-red-200 dark:border-red-900/50 rounded-xl p-6 shadow-sm dark:shadow-none">
        <h3 class="text-base font-semibold text-red-700 dark:text-red-400 mb-1" x-text="t('dangerZone')"></h3>
        <p class="text-neutral-500 text-sm mb-4" x-text="t('dangerZoneDesc')"></p>
        <div class="flex items-center justify-between bg-red-50 dark:bg-red-900/20 rounded-xl p-4 border border-red-200 dark:border-red-800">
          <div>
            <p class="font-medium text-red-700 dark:text-red-300" x-text="t('resetSetup')"></p>
            <p class="text-sm text-red-600/80 dark:text-red-400/70 mt-1" x-text="t('resetSetupDesc')"></p>
          </div>
          <button @click="resetSetup()" :disabled="loading" class="shrink-0 ml-4 bg-red-600 hover:bg-red-700 disabled:opacity-50 disabled:cursor-not-allowed text-white px-5 py-2.5 rounded-lg font-medium transition-colors" x-text="t('resetSetup')"></button>
        </div>
      </div>
    </div>

    <!-- Wizard view (unconfigured) -->
    <div x-show="isReady && !configured" x-cloak>
      <div class="flex items-center justify-center gap-2 mb-8">
        <template x-for="s in totalSteps" :key="s">
          <div class="flex items-center">
            <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-medium transition-all cursor-pointer" :class="step === s ? 'bg-red-600 text-white' : (step > s ? 'bg-emerald-600 text-white' : 'bg-neutral-200 dark:bg-neutral-800 text-neutral-500')" @click="goToStep(s)" x-text="s"></div>
            <div x-show="s < totalSteps" class="w-12 h-0.5 mx-1" :class="step > s ? 'bg-emerald-600' : 'bg-neutral-200 dark:bg-neutral-800'"></div>
          </div>
        </template>
      </div>

      <!-- Step 1: Model & Auth (Multi Provider) -->
      <div x-show="step === 1" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 translate-x-4" x-transition:enter-end="opacity-100 translate-x-0">
        <div class="bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 rounded-xl p-6 shadow-sm dark:shadow-none">
          <h2 class="text-lg font-semibold mb-1" x-text="t('step1Title')"></h2>
          <p class="text-neutral-500 text-sm mb-6" x-text="t('step1Desc')"></p>

          <div class="space-y-5">
            <template x-for="(provider, pIndex) in providers" :key="provider.id">
              <div class="rounded-lg border border-neutral-200 dark:border-neutral-800 p-4 space-y-4">
                <div class="flex items-center justify-between">
                  <h4 class="text-sm font-medium" x-text="t('providerConfigTitle') + ' #' + (pIndex + 1)"></h4>
                  <button
                    x-show="providers.length > 1"
                    @click="removeProvider(pIndex)"
                    type="button"
                    class="text-xs text-red-600 hover:text-red-700 dark:text-red-400 dark:hover:text-red-300"
                    x-text="t('removeProvider')"></button>
                </div>

                <div>
                  <label class="block text-xs uppercase tracking-wide text-neutral-500 font-medium mb-2" x-text="t('providerGroup')"></label>
                  <select x-model="provider.selectedGroup" @change="updateProviderAuthChoices(provider)" class="w-full bg-neutral-50 dark:bg-neutral-800 border border-neutral-300 dark:border-neutral-700 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-red-500 transition-colors">
                    <template x-for="g in authGroups" :key="g.value">
                      <option :value="g.value" x-text="g.label + (g.hint ? ' — ' + g.hint : '')"></option>
                    </template>
                  </select>
                </div>

                <div x-show="!isCustomGroupFor(provider)">
                  <label class="block text-xs uppercase tracking-wide text-neutral-500 font-medium mb-2" x-text="t('authMethod')"></label>
                  <select x-model="provider.selectedAuth" class="w-full bg-neutral-50 dark:bg-neutral-800 border border-neutral-300 dark:border-neutral-700 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-red-500 transition-colors">
                    <template x-for="o in provider.authChoices" :key="o.value">
                      <option :value="o.value" x-text="o.label + (o.hint ? ' — ' + o.hint : '')"></option>
                    </template>
                  </select>
                </div>

                <div x-show="!isProviderFromEnvFor(provider)">
                  <label class="block text-xs uppercase tracking-wide text-neutral-500 font-medium mb-2" x-text="t('apiKeyToken')"></label>
                  <input x-model="provider.authSecret" type="password" :placeholder="t('apiKeyPlaceholder')" class="w-full bg-neutral-50 dark:bg-neutral-800 border border-neutral-300 dark:border-neutral-700 rounded-lg px-4 py-3 text-sm placeholder-neutral-400 dark:placeholder-neutral-600 focus:outline-none focus:border-red-500 transition-colors" />
                </div>

                <div x-show="isProviderFromEnvFor(provider)" class="space-y-3 bg-sky-50 dark:bg-sky-900/20 rounded-lg p-4 border border-sky-200 dark:border-sky-800">
                  <h4 class="text-xs uppercase tracking-wide text-sky-700 dark:text-sky-300 font-medium" x-text="t('providerFromEnvTitle')"></h4>
                  <p class="text-xs text-sky-700/80 dark:text-sky-300/80" x-text="t('providerFromEnvDesc')"></p>
                  <div class="grid grid-cols-1 gap-2 text-xs font-mono">
                    <div class="bg-white dark:bg-neutral-900 border border-sky-200 dark:border-sky-800 rounded px-3 py-2 break-all">
                      <span class="text-neutral-500" x-text="t('aiProviderVar') + '='"></span>
                      <span x-text="envProvider.values.aiProvider || '—'"></span>
                    </div>
                    <div class="bg-white dark:bg-neutral-900 border border-sky-200 dark:border-sky-800 rounded px-3 py-2 break-all">
                      <span class="text-neutral-500" x-text="t('providerBaseUrlVar') + '='"></span>
                      <span x-text="envProvider.values.providerBaseUrl || '—'"></span>
                    </div>
                    <div class="bg-white dark:bg-neutral-900 border border-sky-200 dark:border-sky-800 rounded px-3 py-2 break-all">
                      <span class="text-neutral-500" x-text="t('providerApiKeyVar') + '='"></span>
                      <span x-text="envProvider.values.providerApiKey || '—'"></span>
                    </div>
                  </div>
                </div>

                <div x-show="isProviderFromEnvFor(provider) && envProvider && !envProvider.valid" class="space-y-2 bg-red-50 dark:bg-red-900/20 rounded-lg p-4 border border-red-200 dark:border-red-800">
                  <p class="text-sm font-medium text-red-700 dark:text-red-300" x-text="t('envProviderInvalid')"></p>
                  <p class="text-xs text-red-700/90 dark:text-red-300/90" x-text="envProvider.error || ''"></p>
                  <p class="text-xs text-red-700/90 dark:text-red-300/90">
                    <span class="font-medium" x-text="t('envProviderAllowed') + ': '"></span>
                    <span x-text="(envProvider.allowedProviders || []).join(', ')"></span>
                  </p>
                  <p class="text-xs text-red-700/90 dark:text-red-300/90" x-text="t('envProviderFixHint')"></p>
                </div>

                <div x-show="isCustomGroupFor(provider) && !isProviderFromEnvFor(provider)" class="space-y-4 bg-neutral-50 dark:bg-neutral-800/50 rounded-lg p-4 border border-neutral-200 dark:border-neutral-800">
                  <h4 class="text-xs uppercase tracking-wide text-neutral-500 font-medium" x-text="t('customProviderConfig')"></h4>
                  <div x-show="provider.selectedAuth === 'custom-provider'">
                    <label class="block text-xs uppercase tracking-wide text-neutral-500 font-medium mb-2" x-text="t('customProviderNameLabel')"></label>
                    <input x-model="provider.customProviderName" @input="syncAgentProviders()" type="text" :placeholder="t('customProviderNamePlaceholder')" class="w-full bg-white dark:bg-neutral-900 border border-neutral-300 dark:border-neutral-700 rounded-lg px-4 py-3 text-sm placeholder-neutral-400 dark:placeholder-neutral-600 focus:outline-none focus:border-red-500 transition-colors" />
                  </div>
                  <div>
                    <label class="block text-xs uppercase tracking-wide text-neutral-500 font-medium mb-2" x-text="t('customBaseUrlLabel')"></label>
                    <input x-model="provider.customBaseUrl" type="text" :placeholder="t('customBaseUrlPlaceholder')" class="w-full bg-white dark:bg-neutral-900 border border-neutral-300 dark:border-neutral-700 rounded-lg px-4 py-3 text-sm placeholder-neutral-400 dark:placeholder-neutral-600 focus:outline-none focus:border-red-500 transition-colors" />
                  </div>
                  <div>
                    <label class="block text-xs uppercase tracking-wide text-neutral-500 font-medium mb-2" x-text="t('customApiTypeLabel')"></label>
                    <select x-model="provider.customApiType" class="w-full bg-white dark:bg-neutral-900 border border-neutral-300 dark:border-neutral-700 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-red-500 transition-colors">
                      <option value="openai-completions">OpenAI Completions</option>
                      <option value="anthropic-messages">Anthropic Messages</option>
                    </select>
                  </div>
                  <div>
                    <label class="block text-xs uppercase tracking-wide text-neutral-500 font-medium mb-2" x-text="t('customModelIdLabel')"></label>
                    <input x-model="provider.customModelId" @input="syncAgentProviders()" type="text" :placeholder="t('customModelIdPlaceholder')" class="w-full bg-white dark:bg-neutral-900 border border-neutral-300 dark:border-neutral-700 rounded-lg px-4 py-3 text-sm placeholder-neutral-400 dark:placeholder-neutral-600 focus:outline-none focus:border-red-500 transition-colors" />
                  </div>
                </div>

                <div x-show="!isCustomGroupFor(provider)">
                  <label class="block text-xs uppercase tracking-wide text-neutral-500 font-medium mb-2" x-text="t('modelLabel')"></label>
                  <input x-model="provider.model" @input="syncAgentProviders()" type="text" :placeholder="t('modelPlaceholder')" class="w-full bg-neutral-50 dark:bg-neutral-800 border border-neutral-300 dark:border-neutral-700 rounded-lg px-4 py-3 text-sm placeholder-neutral-400 dark:placeholder-neutral-600 focus:outline-none focus:border-red-500 transition-colors" />
                  <p class="text-xs text-neutral-500 dark:text-neutral-600 mt-2" x-text="t('modelHint')"></p>
                </div>
              </div>
            </template>

            <button @click="addProvider()" type="button" class="w-full bg-neutral-100 dark:bg-neutral-800 hover:bg-neutral-200 dark:hover:bg-neutral-700 text-neutral-700 dark:text-neutral-300 px-4 py-2.5 rounded-lg font-medium border border-neutral-300 dark:border-neutral-700 transition-colors" x-text="t('addProvider')"></button>
          </div>
        </div>
      </div>

      <!-- Step 2: Agents -->
      <div x-show="step === 2" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 translate-x-4" x-transition:enter-end="opacity-100 translate-x-0">
        <div class="bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 rounded-xl p-6 shadow-sm dark:shadow-none">
          <h2 class="text-lg font-semibold mb-1" x-text="t('step2Title')"></h2>
          <p class="text-neutral-500 text-sm mb-6" x-text="t('step2Desc')"></p>

          <div x-show="providerModelOptions.length === 0" class="mb-4 text-sm text-amber-700 dark:text-amber-300 bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-800 rounded-lg px-4 py-3" x-text="t('noProviderModel')"></div>

          <div class="space-y-4">
            <template x-for="(agent, aIndex) in agents" :key="agent.id">
              <div class="rounded-lg border border-neutral-200 dark:border-neutral-800 p-4 space-y-4">
                <div class="flex items-center justify-between">
                  <h4 class="text-sm font-medium" x-text="t('agents') + ' #' + (aIndex + 1)"></h4>
                  <button x-show="agents.length > 1" @click="removeAgent(aIndex)" type="button" class="text-xs text-red-600 hover:text-red-700 dark:text-red-400 dark:hover:text-red-300" x-text="t('removeAgent')"></button>
                </div>

                <div>
                  <label class="block text-xs uppercase tracking-wide text-neutral-500 font-medium mb-2" x-text="t('agentName')"></label>
                  <input x-model="agent.name" type="text" :placeholder="t('agentNamePlaceholder')" class="w-full bg-neutral-50 dark:bg-neutral-800 border border-neutral-300 dark:border-neutral-700 rounded-lg px-4 py-3 text-sm placeholder-neutral-400 dark:placeholder-neutral-600 focus:outline-none focus:border-red-500 transition-colors" />
                </div>

                <div>
                  <label class="block text-xs uppercase tracking-wide text-neutral-500 font-medium mb-2" x-text="t('agentProvider')"></label>
                  <select x-model="agent.providerId" @change="onAgentProviderChange(agent)" class="w-full bg-neutral-50 dark:bg-neutral-800 border border-neutral-300 dark:border-neutral-700 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-red-500 transition-colors">
                    <option value="" x-text="t('selectProvider')"></option>
                    <template x-for="opt in providerModelOptions" :key="opt.id">
                      <option :value="opt.id" x-text="opt.label"></option>
                    </template>
                  </select>
                </div>

                <div>
                  <label class="block text-xs uppercase tracking-wide text-neutral-500 font-medium mb-2" x-text="t('agentModel')"></label>
                  <input x-model="agent.model" type="text" readonly class="w-full bg-neutral-100 dark:bg-neutral-800/70 border border-neutral-300 dark:border-neutral-700 rounded-lg px-4 py-3 text-sm text-neutral-600 dark:text-neutral-300" />
                </div>
              </div>
            </template>

            <button @click="addAgent()" type="button" class="w-full bg-neutral-100 dark:bg-neutral-800 hover:bg-neutral-200 dark:hover:bg-neutral-700 text-neutral-700 dark:text-neutral-300 px-4 py-2.5 rounded-lg font-medium border border-neutral-300 dark:border-neutral-700 transition-colors" x-text="t('addAgent')"></button>
          </div>
        </div>
      </div>

      <!-- Step 3: Channels -->
      <div x-show="step === 3" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 translate-x-4" x-transition:enter-end="opacity-100 translate-x-0">
        <div class="bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 rounded-xl p-6 shadow-sm dark:shadow-none">
          <h2 class="text-lg font-semibold mb-1" x-text="t('step3Title')"></h2>
          <p class="text-neutral-500 text-sm mb-6" x-text="t('step3Desc')"></p>
          <div class="space-y-5">
            <div class="bg-sky-50 dark:bg-neutral-800/50 rounded-lg p-4 border border-sky-200 dark:border-neutral-800">
              <div class="flex items-center gap-3 mb-3">
                <div class="w-8 h-8 bg-sky-500/20 rounded-lg flex items-center justify-center">
                  <svg class="w-5 h-5 text-sky-500 dark:text-sky-400" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69a.2.2 0 00-.05-.18c-.06-.05-.14-.03-.21-.02-.09.02-1.49.95-4.22 2.79-.4.27-.76.41-1.08.4-.36-.01-1.04-.2-1.55-.37-.63-.2-1.12-.31-1.08-.66.02-.18.27-.36.74-.55 2.92-1.27 4.86-2.11 5.83-2.51 2.78-1.16 3.35-1.36 3.73-1.36.08 0 .27.02.39.12.1.08.13.19.14.27-.01.06.01.24 0 .38z"/></svg>
                </div>
                <span class="font-medium">Telegram</span>
              </div>
              <input x-model="telegramToken" type="password" :placeholder="t('telegramPlaceholder')" class="w-full bg-white dark:bg-neutral-900 border border-neutral-300 dark:border-neutral-700 rounded-lg px-4 py-3 text-sm placeholder-neutral-400 dark:placeholder-neutral-600 focus:outline-none focus:border-sky-500 transition-colors" />
              <p class="text-xs text-neutral-500 dark:text-neutral-600 mt-2" x-text="t('telegramHint')"></p>
            </div>
            <div class="bg-indigo-50 dark:bg-neutral-800/50 rounded-lg p-4 border border-indigo-200 dark:border-neutral-800">
              <div class="flex items-center gap-3 mb-3">
                <div class="w-8 h-8 bg-indigo-500/20 rounded-lg flex items-center justify-center">
                  <svg class="w-5 h-5 text-indigo-500 dark:text-indigo-400" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.25.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.37a.07.07 0 00-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 00.031.057 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 00-.041-.106 13.107 13.107 0 01-1.872-.892.077.077 0 01-.008-.128 10.2 10.2 0 00.372-.292.074.074 0 01.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.098.246.198.373.292a.077.077 0 01-.006.127 12.299 12.299 0 01-1.873.892.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
                </div>
                <span class="font-medium">Discord</span>
              </div>
              <input x-model="discordToken" type="password" :placeholder="t('discordPlaceholder')" class="w-full bg-white dark:bg-neutral-900 border border-neutral-300 dark:border-neutral-700 rounded-lg px-4 py-3 text-sm placeholder-neutral-400 dark:placeholder-neutral-600 focus:outline-none focus:border-indigo-500 transition-colors" />
              <p class="text-xs text-neutral-500 dark:text-neutral-600 mt-2" x-text="t('discordHint')"></p>
            </div>
            <div class="bg-green-50 dark:bg-neutral-800/50 rounded-lg p-4 border border-green-200 dark:border-neutral-800">
              <div class="flex items-center gap-3 mb-3">
                <div class="w-8 h-8 bg-green-500/20 rounded-lg flex items-center justify-center">
                  <svg class="w-5 h-5 text-green-600 dark:text-green-400" viewBox="0 0 24 24" fill="currentColor"><path d="M5.042 15.165a2.528 2.528 0 01-2.52 2.523A2.528 2.528 0 010 15.165a2.527 2.527 0 012.522-2.52h2.52v2.52zm1.271 0a2.527 2.527 0 012.521-2.52 2.527 2.527 0 012.521 2.52v6.313A2.528 2.528 0 018.834 24a2.528 2.528 0 01-2.521-2.522v-6.313zM8.834 5.042a2.528 2.528 0 01-2.521-2.52A2.528 2.528 0 018.834 0a2.528 2.528 0 012.521 2.522v2.52H8.834zm0 1.271a2.528 2.528 0 012.521 2.521 2.528 2.528 0 01-2.521 2.521H2.522A2.528 2.528 0 010 8.834a2.528 2.528 0 012.522-2.521h6.312zm10.124 2.521a2.528 2.528 0 012.522-2.521A2.528 2.528 0 0124 8.834a2.528 2.528 0 01-2.52 2.521h-2.522V8.834zm-1.271 0a2.528 2.528 0 01-2.521 2.521 2.528 2.528 0 01-2.521-2.521V2.522A2.528 2.528 0 0115.166 0a2.528 2.528 0 012.521 2.522v6.312zm-2.521 10.124a2.528 2.528 0 012.521 2.522A2.528 2.528 0 0115.166 24a2.528 2.528 0 01-2.521-2.522v-2.522h2.521zm0-1.271a2.528 2.528 0 01-2.521-2.521 2.528 2.528 0 012.521-2.521h6.312A2.528 2.528 0 0124 15.165a2.528 2.528 0 01-2.52 2.521h-6.313z"/></svg>
                </div>
                <span class="font-medium">Slack</span>
              </div>
              <div class="space-y-3">
                <input x-model="slackBotToken" type="password" :placeholder="t('slackBotPlaceholder')" class="w-full bg-white dark:bg-neutral-900 border border-neutral-300 dark:border-neutral-700 rounded-lg px-4 py-3 text-sm placeholder-neutral-400 dark:placeholder-neutral-600 focus:outline-none focus:border-green-500 transition-colors" />
                <input x-model="slackAppToken" type="password" :placeholder="t('slackAppPlaceholder')" class="w-full bg-white dark:bg-neutral-900 border border-neutral-300 dark:border-neutral-700 rounded-lg px-4 py-3 text-sm placeholder-neutral-400 dark:placeholder-neutral-600 focus:outline-none focus:border-green-500 transition-colors" />
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Step 4: Run Setup -->
      <div x-show="step === 4" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 translate-x-4" x-transition:enter-end="opacity-100 translate-x-0">
        <div class="bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 rounded-xl p-6 shadow-sm dark:shadow-none">
          <h2 class="text-lg font-semibold mb-1" x-text="t('step4Title')"></h2>
          <p class="text-neutral-500 text-sm mb-6" x-text="t('step4Desc')"></p>
          <div class="bg-neutral-50 dark:bg-neutral-800/50 rounded-lg p-4 border border-neutral-200 dark:border-neutral-800 mb-6">
            <h3 class="text-sm font-medium text-neutral-600 dark:text-neutral-400 mb-3" x-text="t('configSummary')"></h3>
            <dl class="space-y-2 text-sm">
              <div class="flex justify-between">
                <dt class="text-neutral-500" x-text="t('providers')"></dt>
                <dd class="text-neutral-700 dark:text-neutral-300 text-right ml-4">
                  <template x-for="(p, idx) in providers" :key="p.id">
                    <div>
                      <span x-text="(idx + 1) + '. '"></span>
                      <span x-text="getProviderDisplayLabel(p)"></span>
                    </div>
                  </template>
                </dd>
              </div>
              <div class="flex justify-between">
                <dt class="text-neutral-500" x-text="t('agents')"></dt>
                <dd class="text-neutral-700 dark:text-neutral-300 text-right ml-4">
                  <template x-for="a in agents" :key="a.id">
                    <div>
                      <span x-text="a.name"></span>
                      <span class="text-neutral-500"> → </span>
                      <span x-text="a.model || '—'"></span>
                    </div>
                  </template>
                </dd>
              </div>
              <div class="flex justify-between">
                <dt class="text-neutral-500" x-text="t('channels')"></dt>
                <dd class="text-neutral-700 dark:text-neutral-300">
                  <span x-show="telegramToken" class="inline-flex items-center gap-1 bg-sky-100 dark:bg-sky-500/20 text-sky-600 dark:text-sky-400 px-2 py-0.5 rounded text-xs mr-1">Telegram</span>
                  <span x-show="discordToken" class="inline-flex items-center gap-1 bg-indigo-100 dark:bg-indigo-500/20 text-indigo-600 dark:text-indigo-400 px-2 py-0.5 rounded text-xs mr-1">Discord</span>
                  <span x-show="slackBotToken && slackAppToken" class="inline-flex items-center gap-1 bg-green-100 dark:bg-green-500/20 text-green-600 dark:text-green-400 px-2 py-0.5 rounded text-xs">Slack</span>
                  <span x-show="!telegramToken && !discordToken && !(slackBotToken && slackAppToken)" class="text-neutral-500" x-text="t('none')"></span>
                </dd>
              </div>
            </dl>
          </div>
          <div class="bg-amber-50 dark:bg-neutral-800/50 rounded-lg p-4 border border-amber-200 dark:border-neutral-800 mb-6">
            <div class="flex flex-wrap items-center justify-between gap-2 mb-2">
              <h3 class="text-sm font-medium text-amber-900 dark:text-neutral-200" x-text="t('previewTitle')"></h3>
              <button @click="previewChanges(null, { force: true })" :disabled="previewing || loading || !canRunSetup" class="bg-amber-600 hover:bg-amber-700 disabled:opacity-50 disabled:cursor-not-allowed text-white px-3 py-1.5 rounded-lg text-xs font-medium transition-colors">
                <span x-show="!previewing" x-text="t('previewBtn')"></span>
                <span x-show="previewing" x-text="t('loading')"></span>
              </button>
            </div>
            <p class="text-xs text-amber-800/80 dark:text-neutral-400 mb-3" x-text="t('previewDesc')"></p>
            <div x-show="previewError" class="text-xs text-red-700 dark:text-red-300 mb-3 whitespace-pre-wrap" x-text="previewError"></div>
            <div x-show="previewResult && previewResult.blocked" class="text-xs text-amber-900 dark:text-amber-200 mb-3" x-text="t('previewBlocked')"></div>
            <div x-show="previewResult && !previewResult.blocked" class="space-y-3">
              <div class="text-xs text-amber-900 dark:text-neutral-300 space-y-1">
                <div>
                  <span x-text="t('previewOpenclawVersion')"></span>
                  <span>: </span>
                  <span x-text="previewResult.openclawVersion || openclawVersion || '-'"></span>
                </div>
                <div>
                  <span x-text="t('previewGeneratedAt')"></span>
                  <span>: </span>
                  <span x-text="previewResult.generatedAt ? new Date(previewResult.generatedAt).toLocaleString() : '-'"></span>
                </div>
                <div>
                  <span x-text="t('previewChangedFiles')"></span>
                  <span>: </span>
                  <span x-text="previewResult.summary && typeof previewResult.summary.changedFiles === 'number' ? previewResult.summary.changedFiles : 0"></span>
                </div>
              </div>

              <template x-if="previewResult.notes && previewResult.notes.length">
                <div class="bg-white/60 dark:bg-neutral-900 border border-amber-200 dark:border-neutral-700 rounded p-2 text-xs text-amber-900 dark:text-neutral-300 whitespace-pre-wrap" x-text="previewResult.notes.join('\n')"></div>
              </template>

              <div x-show="previewResult.files && previewResult.files.length" class="space-y-2">
                <template x-for="file in previewResult.files" :key="file.path">
                  <details class="bg-white/70 dark:bg-neutral-900 border border-amber-200 dark:border-neutral-700 rounded">
                    <summary class="cursor-pointer px-3 py-2 text-xs font-medium text-amber-900 dark:text-neutral-200 break-all">
                      <span x-text="file.path"></span>
                      <span class="text-amber-700 dark:text-neutral-400"> • </span>
                      <span x-text="t('previewReason')"></span>
                      <span>: </span>
                      <span x-text="file.reason || '-'"></span>
                    </summary>
                    <pre class="px-3 pb-3 overflow-x-auto text-[11px] leading-5 whitespace-pre-wrap text-amber-950 dark:text-neutral-300" x-text="file.diff || file.after"></pre>
                  </details>
                </template>
              </div>
              <p x-show="!previewResult.files || previewResult.files.length === 0" class="text-xs text-amber-900 dark:text-neutral-300" x-text="t('previewNone')"></p>
            </div>
          </div>
          <div class="flex flex-wrap gap-3 mb-4">
            <button @click="runSetup()" :disabled="loading || !canRunSetup" class="bg-red-600 hover:bg-red-700 disabled:opacity-50 disabled:cursor-not-allowed text-white px-6 py-3 rounded-lg font-medium transition-colors">
              <span x-show="!loading" x-text="t('runSetupBtn')"></span>
              <span x-show="loading" class="flex items-center gap-2"><svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg><span x-text="t('running')"></span></span>
            </button>
            <button @click="resetSetup()" :disabled="loading" class="text-neutral-500 hover:text-neutral-700 dark:hover:text-neutral-300 hover:bg-neutral-100 dark:hover:bg-neutral-800 disabled:opacity-50 disabled:cursor-not-allowed px-4 py-3 rounded-lg font-medium transition-colors" x-text="t('reset')"></button>
          </div>
          <div x-show="log" class="bg-neutral-100 dark:bg-neutral-950 border border-neutral-200 dark:border-neutral-800 rounded-lg p-4 font-mono text-xs text-neutral-600 dark:text-neutral-400 whitespace-pre-wrap max-h-64 overflow-y-auto" x-text="log"></div>
          <p class="text-xs text-neutral-500 dark:text-neutral-600 mt-4" x-text="t('resetNote')"></p>
        </div>
      </div>

      <!-- Nav buttons -->
      <div class="flex justify-between mt-6">
        <button x-show="step > 1" @click="prevStep()" class="flex items-center gap-2 text-neutral-500 hover:text-neutral-700 dark:text-neutral-400 dark:hover:text-neutral-200 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
          <span x-text="t('back')"></span>
        </button>
        <div x-show="step === 1"></div>
        <button x-show="step < totalSteps" @click="nextStep()" :disabled="!canGoNext" class="flex items-center gap-2 bg-neutral-200 dark:bg-neutral-800 hover:bg-neutral-300 dark:hover:bg-neutral-700 disabled:opacity-50 disabled:cursor-not-allowed text-neutral-800 dark:text-neutral-200 px-5 py-2.5 rounded-lg font-medium transition-colors ml-auto">
          <span x-text="t('next')"></span>
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        </button>
      </div>
      <p x-show="navError" class="mt-3 text-sm text-red-600 dark:text-red-400" x-text="navError"></p>
    </div>

    <!-- Devices Modal -->
    <div x-show="showDevicesModal" x-cloak class="fixed inset-0 bg-black/50 dark:bg-black/70 flex items-center justify-center z-50" @click.self="closeDevicesModal()">
      <div class="bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 rounded-xl p-6 w-full max-w-lg mx-4 shadow-xl dark:shadow-none max-h-[80vh] overflow-y-auto">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-lg font-semibold" x-text="t('manageDevices')"></h3>
          <div class="flex items-center gap-2">
            <button @click="loadDevices()" :disabled="devicesLoading" class="text-neutral-500 hover:text-neutral-700 dark:hover:text-neutral-300 p-2 rounded-lg hover:bg-neutral-100 dark:hover:bg-neutral-800 transition-colors">
              <svg class="w-4 h-4" :class="devicesLoading && 'animate-spin'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
            </button>
            <button @click="closeDevicesModal()" class="text-neutral-500 hover:text-neutral-700 dark:hover:text-neutral-300 p-2 rounded-lg hover:bg-neutral-100 dark:hover:bg-neutral-800 transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
          </div>
        </div>
        <p class="text-sm text-neutral-500 dark:text-neutral-400 mb-4" x-text="t('devicesModalDesc')"></p>
        <button @click="approveDevice()" :disabled="devicesLoading" class="w-full mb-4 bg-violet-600 hover:bg-violet-700 disabled:opacity-50 disabled:cursor-not-allowed text-white px-4 py-2.5 rounded-lg font-medium transition-colors">
          <span x-show="!devicesLoading" x-text="t('approveLatest')"></span>
          <span x-show="devicesLoading" class="flex items-center justify-center gap-2"><svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg><span x-text="t('loading')"></span></span>
        </button>
        <div class="space-y-4">
          <div>
            <h4 class="text-xs uppercase tracking-wide text-neutral-500 font-medium mb-2" x-text="t('pendingRequests')"></h4>
            <div x-show="devicesPending.length === 0 && !devicesLoading" class="text-sm text-neutral-400 dark:text-neutral-600 bg-neutral-50 dark:bg-neutral-800/50 rounded-lg p-3 border border-neutral-200 dark:border-neutral-800" x-text="t('noPending')"></div>
            <div class="space-y-2">
              <template x-for="req in devicesPending" :key="req.requestId || req.id">
                <div class="flex items-center justify-between bg-violet-50 dark:bg-violet-900/20 border border-violet-200 dark:border-violet-800 rounded-lg p-3">
                  <div class="min-w-0 flex-1">
                    <p class="text-sm font-medium text-violet-700 dark:text-violet-300 truncate" x-text="req.requestId || req.id"></p>
                    <p x-show="req.createdAt" class="text-xs text-violet-500 dark:text-violet-400" x-text="req.createdAt ? new Date(req.createdAt).toLocaleString() : ''"></p>
                  </div>
                  <div class="flex gap-2 ml-3 shrink-0">
                    <button @click="approveDevice(req.requestId || req.id)" :disabled="devicesLoading" class="bg-emerald-600 hover:bg-emerald-700 disabled:opacity-50 text-white px-3 py-1.5 rounded-lg text-xs font-medium transition-colors" x-text="t('approve')"></button>
                    <button @click="rejectDevice(req.requestId || req.id)" :disabled="devicesLoading" class="bg-red-600 hover:bg-red-700 disabled:opacity-50 text-white px-3 py-1.5 rounded-lg text-xs font-medium transition-colors" x-text="t('reject')"></button>
                  </div>
                </div>
              </template>
            </div>
          </div>
          <div>
            <h4 class="text-xs uppercase tracking-wide text-neutral-500 font-medium mb-2" x-text="t('pairedDevices')"></h4>
            <div x-show="devicesPaired.length === 0 && !devicesLoading" class="text-sm text-neutral-400 dark:text-neutral-600 bg-neutral-50 dark:bg-neutral-800/50 rounded-lg p-3 border border-neutral-200 dark:border-neutral-800" x-text="t('noPaired')"></div>
            <div class="space-y-2">
              <template x-for="dev in devicesPaired" :key="dev.deviceId || dev.id">
                <div class="flex items-center justify-between bg-neutral-50 dark:bg-neutral-800/50 border border-neutral-200 dark:border-neutral-800 rounded-lg p-3">
                  <div class="min-w-0 flex-1">
                    <p class="text-sm font-medium text-neutral-700 dark:text-neutral-300 truncate" x-text="dev.deviceId || dev.id"></p>
                    <p class="text-xs text-neutral-500 dark:text-neutral-400">
                      <span x-show="dev.role" x-text="dev.role" class="bg-neutral-200 dark:bg-neutral-700 px-1.5 py-0.5 rounded mr-1"></span>
                      <span x-show="dev.createdAt" x-text="dev.createdAt ? new Date(dev.createdAt).toLocaleString() : ''"></span>
                    </p>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Export Info Modal -->
    <div x-show="showExportInfo" x-cloak class="fixed inset-0 bg-black/50 dark:bg-black/70 flex items-center justify-center z-50" @click.self="showExportInfo = false">
      <div class="bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 rounded-xl p-6 w-full max-w-md mx-4 shadow-xl dark:shadow-none">
        <h3 class="text-lg font-semibold mb-4" x-text="t('unzipTitle')"></h3>
        <p class="text-sm text-neutral-600 dark:text-neutral-400 mb-4" x-text="t('unzipDesc')"></p>
        <div class="space-y-4">
          <div>
            <p class="text-xs uppercase tracking-wide text-neutral-500 font-medium mb-2" x-text="t('macLinux')"></p>
            <code class="block bg-neutral-100 dark:bg-neutral-950 border border-neutral-200 dark:border-neutral-800 rounded-lg px-4 py-3 text-sm text-neutral-700 dark:text-neutral-300 font-mono">unzip -P YOUR_PASSWORD openclaw-export-*.zip</code>
          </div>
          <div>
            <p class="text-xs uppercase tracking-wide text-neutral-500 font-medium mb-2" x-text="t('windowsPs')"></p>
            <p class="text-sm text-neutral-600 dark:text-neutral-400" x-text="t('windowsPsDesc')"></p>
          </div>
          <div>
            <p class="text-xs uppercase tracking-wide text-neutral-500 font-medium mb-2" x-text="t('using7z')"></p>
            <code class="block bg-neutral-100 dark:bg-neutral-950 border border-neutral-200 dark:border-neutral-800 rounded-lg px-4 py-3 text-sm text-neutral-700 dark:text-neutral-300 font-mono">7z x -pYOUR_PASSWORD openclaw-export-*.zip</code>
          </div>
        </div>
        <button @click="showExportInfo = false" class="w-full mt-6 bg-neutral-100 dark:bg-neutral-800 hover:bg-neutral-200 dark:hover:bg-neutral-700 text-neutral-700 dark:text-neutral-300 px-4 py-3 rounded-lg font-medium border border-neutral-300 dark:border-neutral-700 transition-colors" x-text="t('close')"></button>
      </div>
    </div>

    <!-- Pairing Modal -->
    <div x-show="showPairingModal" x-cloak class="fixed inset-0 bg-black/50 dark:bg-black/70 flex items-center justify-center z-50" @click.self="showPairingModal = false">
      <div class="bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 rounded-xl p-6 w-full max-w-sm mx-4 shadow-xl dark:shadow-none">
        <h3 class="text-lg font-semibold mb-4" x-text="t('approveChannelAccess')"></h3>
        <div class="space-y-4">
          <div>
            <label class="block text-xs uppercase tracking-wide text-neutral-500 font-medium mb-2" x-text="t('channel')"></label>
            <select x-model="pairingChannel" class="w-full bg-neutral-50 dark:bg-neutral-800 border border-neutral-300 dark:border-neutral-700 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-red-500 transition-colors">
              <option value="" x-text="t('selectChannel')"></option>
              <option value="telegram">Telegram</option>
              <option value="discord">Discord</option>
            </select>
          </div>
          <div>
            <label class="block text-xs uppercase tracking-wide text-neutral-500 font-medium mb-2" x-text="t('pairingCode')"></label>
            <input x-model="pairingCode" type="text" placeholder="e.g. 3EY4PUYS" class="w-full bg-neutral-50 dark:bg-neutral-800 border border-neutral-300 dark:border-neutral-700 rounded-lg px-4 py-3 text-sm placeholder-neutral-400 dark:placeholder-neutral-600 focus:outline-none focus:border-red-500 transition-colors" />
          </div>
          <div class="flex gap-3 pt-2">
            <button @click="approvePairing()" class="flex-1 bg-red-600 hover:bg-red-700 text-white px-4 py-3 rounded-lg font-medium transition-colors" x-text="t('approve')"></button>
            <button @click="showPairingModal = false" class="flex-1 bg-neutral-100 dark:bg-neutral-800 hover:bg-neutral-200 dark:hover:bg-neutral-700 text-neutral-700 dark:text-neutral-300 px-4 py-3 rounded-lg font-medium border border-neutral-300 dark:border-neutral-700 transition-colors" x-text="t('cancel')"></button>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
